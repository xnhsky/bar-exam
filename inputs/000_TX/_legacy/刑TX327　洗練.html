yle=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 60%,rgba(142,110,154,.26) 60%); padding:0 2px;\">盗品その他財産に対する罪に当たる行為によって領得された物<\u002Fspan>を無償で譲り受けた者は、3年以下の拘禁刑に処する。<\u002Fspan><\u002Fp>\n          <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:6px; padding:14px 18px; line-height:1.9; font-family:var(--sans); font-size:14px;\"><span style=\"font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--teal); font-weight:600; margin-right:8px;\">NOTE<\u002Fspan>客体は「<strong style=\"color:var(--violet-deep);\">財産に対する罪に当たる行為によって領得された物<\u002Fstrong>」。①本犯が<strong>財産罪<\u002Fstrong>であること（記述ア＝由来犯罪の限定）、②<strong>直接領得された物<\u002Fstrong>であること（記述ウ＝派生物の除外）、③本犯は犯罪の完全な成立まで不要で財産罪に当たる「<strong>行為<\u002Fstrong>」で足りること（記述エ＝本犯の犯罪性）が条文文言から導かれる。保護法益は本犯被害者の<strong style=\"color:var(--violet-deep);\">追求権<\u002Fstrong>（判例・通説）。<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"law-235\" style=\"background:var(--card); border:1px solid var(--line); border-left:4px solid var(--violet); border-radius:6px; overflow:hidden;\">\n        <div style=\"display:flex; align-items:center; gap:12px; background:var(--tint-2); padding:13px 22px; border-bottom:1px solid var(--line);\">\n          <span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:#fff; background:var(--violet); padding:3px 9px; border-radius:3px;\">条文<\u002Fspan>\n          <span style=\"font-family:var(--serif); font-weight:700; font-size:16px; color:var(--violet-deep);\">刑法235条　窃盗（前提たる財産犯の代表）<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:13px; letter-spacing:.1em; color:var(--violet);\">★★<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:20px 24px; font-family:var(--quote);\">\n          <p style=\"margin:0 0 14px; line-height:1.95; display:flex; gap:10px;\"><span style=\"flex-shrink:0; font-family:var(--mono); font-size:12px; font-weight:600; color:var(--violet); background:var(--tint); border:1px solid var(--line-2); border-radius:3px; padding:1px 8px; height:fit-content;\">本文<\u002Fspan><span>他人の財物を窃取した者は、窃盗の罪とし、十年以下の拘禁刑又は五十万円以下の罰金に処する。<\u002Fspan><\u002Fp>\n          <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:6px; padding:14px 18px; line-height:1.9; font-family:var(--sans); font-size:14px;\"><span style=\"font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--teal); font-weight:600; margin-right:8px;\">NOTE<\u002Fspan>256条の客体を生み出す本犯（財産罪）の代表。窃盗のほか強盗・詐欺・恐喝・横領・背任等の<strong style=\"color:var(--violet-deep);\">財産罪<\u002Fstrong>が本犯となる。これに対し収賄罪・賭博罪等の<strong>非財産罪<\u002Fstrong>は本犯とならず、その領得物は客体から除かれる（記述ア）。窃取された物そのものは直接領得物として客体だが、そこから作出されたコピー等の<strong>派生物<\u002Fstrong>は客体に当たらない（記述ウ）。<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"law-244\" style=\"background:var(--card); border:1px solid var(--line); border-left:4px solid var(--violet); border-radius:6px; overflow:hidden;\">\n        <div style=\"display:flex; align-items:center; gap:12px; background:var(--tint-2); padding:13px 22px; border-bottom:1px solid var(--line);\">\n          <span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:#fff; background:var(--violet); padding:3px 9px; border-radius:3px;\">条文<\u002Fspan>\n          <span style=\"font-family:var(--serif); font-weight:700; font-size:16px; color:var(--violet-deep);\">刑法244条　親族間の犯罪に関する特例<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:13px; letter-spacing:.1em; color:var(--violet);\">★★★<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:20px 24px; font-family:var(--quote);\">\n          <p style=\"margin:0 0 14px; line-height:1.95; display:flex; gap:10px;\"><span style=\"flex-shrink:0; font-family:var(--mono); font-size:12px; font-weight:600; color:var(--violet); background:var(--tint); border:1px solid var(--line-2); border-radius:3px; padding:1px 8px; height:fit-content;\">1項<\u002Fspan><span>配偶者、直系血族又は同居の親族との間で第235条の罪（窃盗）若しくはその未遂罪を犯した者は、その<span style=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 60%,rgba(142,110,154,.26) 60%); padding:0 2px;\">刑を免除する<\u002Fspan>。<\u002Fspan><\u002Fp>\n          <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:6px; padding:14px 18px; line-height:1.9; font-family:var(--sans); font-size:14px;\"><span style=\"font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--teal); font-weight:600; margin-right:8px;\">NOTE<\u002Fspan>法的性質は<strong style=\"color:var(--violet-deep);\">一身的処罰阻却事由（人的処罰阻却事由）<\u002Fstrong>。犯罪の成立（構成要件該当性・違法性・有責性）は認めたうえで、政策的に処罰のみを阻却する規定であり、違法な窃盗の成立を妨げない。したがって親族特例で刑が免除される犯人の窃取物も<strong style=\"color:var(--violet-deep);\">盗品性を有し<\u002Fstrong>256条の客体に当たる（記述エ＝×）。<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"law-192-193\" style=\"background:var(--card); border:1px solid var(--line); border-left:4px solid var(--violet); border-radius:6px; overflow:hidden;\">\n        <div style=\"display:flex; align-items:center; gap:12px; background:var(--tint-2); padding:13px 22px; border-bottom:1px solid var(--line);\">\n          <span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:#fff; background:var(--violet); padding:3px 9px; border-radius:3px;\">条文<\u002Fspan>\n          <span style=\"font-family:var(--serif); font-weight:700; font-size:16px; color:var(--violet-deep);\">民法192条 即時取得／193条 盗品・遺失物の回復<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:13px; letter-spacing:.1em; color:var(--violet);\">★★★<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:20px 24px; font-family:var(--quote);\">\n          <p style=\"margin:0 0 12px; line-height:1.95; display:flex; gap:10px;\"><span style=\"flex-shrink:0; font-family:var(--mono); font-size:12px; font-weight:600; color:var(--violet); background:var(--tint); border:1px solid var(--line-2); border-radius:3px; padding:1px 8px; height:fit-content;\">192<\u002Fspan><span>取引行為によって、平穏に、かつ、公然と動産の占有を始めた者は、善意であり、かつ、過失がないときは、即時にその動産について行使する権利を取得する（<span style=\"font-weight:700; color:var(--violet-deep);\">即時取得<\u002Fspan>）。<\u002Fspan><\u002Fp>\n          <p style=\"margin:0 0 14px; line-height:1.95; display:flex; gap:10px;\"><span style=\"flex-shrink:0; font-family:var(--mono); font-size:12px; font-weight:600; color:var(--violet); background:var(--tint); border:1px solid var(--line-2); border-radius:3px; padding:1px 8px; height:fit-content;\">193<\u002Fspan><span>前条の場合において、占有物が<span style=\"font-weight:700; color:var(--violet-deep);\">盗品又は遺失物<\u002Fspan>であるときは、被害者又は遺失主は、盗難又は遺失の時から<span style=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 60%,rgba(142,110,154,.26) 60%); padding:0 2px;\">2年間<\u002Fspan>、占有者に対してその物の回復を請求することができる。<\u002Fspan><\u002Fp>\n          <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:6px; padding:14px 18px; line-height:1.9; font-family:var(--sans); font-size:14px;\"><span style=\"font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--teal); font-weight:600; margin-right:8px;\">NOTE<\u002Fspan>即時取得（192条）で買主は所有権を原始取得し被害者は所有権を失うが、盗品・遺失物については193条により被害者が2年間回復請求し得る。最決昭34.2.9は、この回復請求が可能な間は<strong style=\"color:var(--violet-deep);\">追求権が存続し盗品性は失われない<\u002Fstrong>とする（記述イ＝×）。<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"case-s34-2-9\" style=\"background:var(--card); border:1px solid var(--line); border-left:4px solid var(--teal); border-radius:6px; overflow:hidden;\">\n        <div style=\"display:flex; align-items:center; gap:12px; background:rgba(94,140,140,.1); padding:13px 22px; border-bottom:1px solid var(--line);\">\n          <span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:#fff; background:var(--teal); padding:3px 9px; border-radius:3px;\">判例<\u002Fspan>\n          <span style=\"font-family:var(--serif); font-weight:700; font-size:16px; color:var(--violet-deep);\">最決昭和34年2月9日（即時取得と盗品性）<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:13px; letter-spacing:.1em; color:var(--teal);\">★★★<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:20px 24px;\">\n          <p style=\"margin:0 0 14px; line-height:1.95; font-family:var(--quote); font-weight:600;\">財産罪の被害物が第三者により即時取得（民法192条）された場合、被害者は所有権を失い追求権を失うが、盗品については、被害者が<span style=\"font-weight:700; color:var(--violet-deep);\">2年間占有回復請求をなし得る（民法193条）<\u002Fspan>から、その間はなお<span style=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 60%,rgba(142,110,154,.26) 60%); padding:0 2px;\">盗品性は失われない<\u002Fspan>。即時取得の成立が直ちに盗品性を失わせるものではない。<\u002Fp>\n          <p style=\"margin:0; line-height:1.9; font-size:14px; font-family:var(--sans);\"><strong style=\"color:var(--violet-deep);\">射程・本問適用　<\u002Fstrong>民法193条の回復請求期間中はなお客体に当たる余地があるから、「即時取得されれば客体に当たる余地はない」とする記述イは×。なお2年経過後や金銭・公の市場での善意取得（民法194条の代価弁償）等では盗品性が制限され得る。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div id=\"case-t5-7-13\" style=\"background:var(--card); border:1px solid var(--line); border-left:4px solid var(--teal); border-radius:6px; overflow:hidden;\">\n        <div style=\"display:flex; align-items:center; gap:12px; background:rgba(94,140,140,.1); padding:13px 22px; border-bottom:1px solid var(--line);\">\n          <span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:#fff; background:var(--teal); padding:3px 9px; border-radius:3px;\">判例<\u002Fspan>\n          <span style=\"font-family:var(--serif); font-weight:700; font-size:16px; color:var(--violet-deep);\">大判大正5年7月13日（本犯は違法な行為で足りる）<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:13px; letter-spacing:.1em; color:var(--teal);\">★★★<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:20px 24px;\">\n          <p style=\"margin:0 0 14px; line-height:1.95; font-family:var(--quote); font-weight:600;\">盗品等関与罪の前提犯罪である財産犯は、<span style=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 60%,rgba(142,110,154,.26) 60%); padding:0 2px;\">犯罪として成立している必要はなく<\u002Fspan>、構成要件該当性・違法性を備えた行為であれば足りる。判例は、14歳未満の者が窃取した物品、親族間の犯罪に関する特例により刑が免除される犯人が窃取した物品、あるいは公訴時効が完成した場合についても、盗品等関与罪の成立を認める。<\u002Fp>\n          <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:6px; padding:14px 18px; line-height:1.9; font-family:var(--sans); font-size:14px;\"><span style=\"font-family:var(--mono); font-size:10px; letter-spacing:.12em; color:var(--teal); font-weight:600; margin-right:8px;\">NOTE<\u002Fspan>256条の客体は「財産罪に当たる<strong style=\"color:var(--violet-deep);\">行為<\u002Fstrong>によって領得された物」であり、本犯者の<strong>可罰性<\u002Fstrong>（処罰されるか否か）とは切り離されている。親族特例（244条）は処罰阻却にすぎず違法な窃盗の成立を妨げないから、その窃取物も盗品である（記述エ＝×）。ただし<strong style=\"color:var(--violet-deep);\">違法性が阻却される<\u002Fstrong>場合（正当行為・自救行為等）は本犯不成立で盗品性を生じない点に注意。<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fsection>\n\n    <!-- ============ 体系ツリー ============ -->\n    <div style=\"display:flex; align-items:center; gap:18px; margin:48px 0 24px;\">\n      <span style=\"font-family:var(--mono); font-size:12px; letter-spacing:.28em; color:var(--violet); font-weight:600;\">MAP 01<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:var(--line-2);\"><\u002Fspan>\n      <span style=\"font-family:var(--serif); font-size:14px; letter-spacing:.1em; color:var(--ink-soft);\">体系ツリー<\u002Fspan>\n    <\u002Fdiv>\n\n    <section id=\"mindmap-tree\" style=\"background:var(--card); border:1px solid var(--line); border-radius:6px; padding:28px 30px; margin-bottom:24px;\">\n      <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:8px; padding:14px;\">\n        <svg viewBox=\"0 0 1500 820\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"盗品等関与罪（刑法256条1項）の客体論の体系的位置づけと本問4記述の○×評価\" style=\"display:block; max-width:100%; height:auto;\">\n          <defs>\n            <marker id=\"treeArr\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\"><path d=\"M2 1L8 5L2 9\" style=\"fill:none; stroke:#8E6E9A; stroke-width:1.6; stroke-linecap:round;\"><\u002Fpath><\u002Fmarker>\n          <\u002Fdefs>\n          <g transform=\"translate(28, 28)\"><text style=\"font-family:'Source Code Pro',monospace; font-size:13px; fill:#8A7E94;\">凡例：L0 罪種 → L1 構成要素 → L2 客体・本犯の視点 → L3 各記述の帰結　|　緑＝本問唯一の○（記述ウ）<\u002Ftext><\u002Fg>\n\n          <path d=\"M 750 110 V 170 H 280 V 210\" style=\"stroke:#8E6E9A; stroke-width:1.8; fill:none;\"><\u002Fpath>\n          <path d=\"M 750 110 V 210\" style=\"stroke:#8E6E9A; stroke-width:1.8; fill:none;\"><\u002Fpath>\n          <path d=\"M 750 110 V 170 H 1220 V 210\" style=\"stroke:#8E6E9A; stroke-width:1.8; fill:none;\"><\u002Fpath>\n\n          <g transform=\"translate(750, 80)\"><rect x=\"-180\" y=\"-30\" width=\"360\" height=\"60\" rx=\"12\" style=\"fill:#4A3D54;\"><\u002Frect><text text-anchor=\"middle\" y=\"7\" style=\"font-family:'Shippori Mincho B1',serif; font-size:17px; font-weight:700; fill:#fff; letter-spacing:.05em;\">刑法256条1項　盗品等関与罪<\u002Ftext><\u002Fg>\n\n          <g transform=\"translate(280, 240)\"><rect x=\"-120\" y=\"-24\" width=\"240\" height=\"48\" rx=\"9\" style=\"fill:#8E6E9A;\"><\u002Frect><text text-anchor=\"middle\" y=\"6\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:14px; font-weight:700; fill:#fff;\">①客体＝領得された物<\u002Ftext><\u002Fg>\n          <g transform=\"translate(750, 240)\"><rect x=\"-120\" y=\"-24\" width=\"240\" height=\"48\" rx=\"9\" style=\"fill:#8E6E9A;\"><\u002Frect><text text-anchor=\"middle\" y=\"6\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:14px; font-weight:700; fill:#fff;\">②客体の限定（本問核心）<\u002Ftext><\u002Fg>\n          <g transform=\"translate(1220, 240)\"><rect x=\"-120\" y=\"-24\" width=\"240\" height=\"48\" rx=\"9\" style=\"fill:#8E6E9A;\"><\u002Frect><text text-anchor=\"middle\" y=\"6\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:14px; font-weight:700; fill:#fff;\">③本犯（前提財産犯）<\u002Ftext><\u002Fg>\n\n          <path d=\"M 280 264 V 320 H 160 V 360\" style=\"stroke:#C9A9D4; stroke-width:1.2; fill:none;\"><\u002Fpath>\n          <path d=\"M 280 264 V 320 H 410 V 360\" style=\"stroke:#C9A9D4; stroke-width:1.2; fill:none;\"><\u002Fpath>\n          <path d=\"M 750 264 V 320 H 600 V 360\" style=\"stroke:#C9A9D4; stroke-width:1.2; fill:none;\"><\u002Fpath>\n          <path d=\"M 750 264 V 320 H 900 V 360\" style=\"stroke:#C9A9D4; stroke-width:1.2; fill:none;\"><\u002Fpath>\n          <path d=\"M 1220 264 V 320 H 1100 V 360\" style=\"stroke:#C9A9D4; stroke-width:1.2; fill:none;\"><\u002Fpath>\n          <path d=\"M 1220 264 V 320 H 1340 V 360\" style=\"stroke:#C9A9D4; stroke-width:1.2; fill:none;\"><\u002Fpath>\n\n          <g transform=\"translate(160, 390)\"><rect x=\"-92\" y=\"-22\" width=\"184\" height=\"44\" rx=\"8\" style=\"fill:#EDE2EF; stroke:#C9A9D4; stroke-width:1;\"><\u002Frect><text text-anchor=\"middle\" y=\"5\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:13px; font-weight:600; fill:#4A3D54;\">追求権（保護法益）<\u002Ftext><\u002Fg>\n          <g transform=\"translate(410, 390)\"><rect x=\"-92\" y=\"-22\" width=\"184\" height=\"44\" rx=\"8\" style=\"fill:#EDE2EF; stroke:#C9A9D4; stroke-width:1;\"><\u002Frect><text text-anchor=\"middle\" y=\"5\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:13px; font-weight:600; fill:#4A3D54;\">財産罪由来性<\u002Ftext><\u002Fg>\n          <g transform=\"translate(600, 390)\"><rect x=\"-92\" y=\"-22\" width=\"184\" height=\"44\" rx=\"8\" style=\"fill:#EDE2EF; stroke:#C9A9D4; stroke-width:1;\"><\u002Frect><text text-anchor=\"middle\" y=\"5\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:13px; font-weight:600; fill:#4A3D54;\">客体の限定3軸<\u002Ftext><\u002Fg>\n          <g transform=\"translate(900, 390)\"><rect x=\"-92\" y=\"-22\" width=\"184\" height=\"44\" rx=\"8\" style=\"fill:#EDE2EF; stroke:#C9A9D4; stroke-width:1;\"><\u002Frect><text text-anchor=\"middle\" y=\"5\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:13px; font-weight:600; fill:#4A3D54;\">本犯の要件<\u002Ftext><\u002Fg>\n          <g transform=\"translate(1100, 390)\"><rect x=\"-92\" y=\"-22\" width=\"184\" height=\"44\" rx=\"8\" style=\"fill:#EDE2EF; stroke:#C9A9D4; stroke-width:1;\"><\u002Frect><text text-anchor=\"middle\" y=\"5\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:13px; font-weight:600; fill:#4A3D54;\">違法で足りる<\u002Ftext><\u002Fg>\n          <g transform=\"translate(1340, 390)\"><rect x=\"-92\" y=\"-22\" width=\"184\" height=\"44\" rx=\"8\" style=\"fill:#EDE2EF; stroke:#C9A9D4; stroke-width:1;\"><\u002Frect><text text-anchor=\"middle\" y=\"5\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:13px; font-weight:600; fill:#4A3D54;\">親族特例244<\u002Ftext><\u002Fg>\n\n          <path d=\"M 600 412 V 470 H 380 V 510\" style=\"stroke:#C9A9D4; stroke-width:1.2; fill:none;\"><\u002Fpath>\n          <path d=\"M 600 412 V 470 H 600 V 510\" style=\"stroke:#C9A9D4; stroke-width:1.2; fill:none;\"><\u002Fpath>\n          <path d=\"M 600 412 V 470 H 820 V 510\" style=\"stroke:#C9A9D4; stroke-width:1.2; fill:none;\"><\u002Fpath>\n          <path d=\"M 900 412 V 470 H 1040 V 510\" style=\"stroke:#C9A9D4; stroke-width:1.2; fill:none;\"><\u002Fpath>\n\n          <g transform=\"translate(380, 540)\"><rect x=\"-108\" y=\"-22\" width=\"216\" height=\"44\" rx=\"8\" style=\"fill:#4F8A5B;\"><\u002Frect><text text-anchor=\"middle\" y=\"5\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:12.5px; font-weight:700; fill:#fff;\">記述ウ ○：コピーは客体外<\u002Ftext><\u002Fg>\n          <g transform=\"translate(600, 540)\"><rect x=\"-104\" y=\"-22\" width=\"208\" height=\"44\" rx=\"8\" style=\"fill:#fff; stroke:#D6C9DC; stroke-width:1;\"><\u002Frect><text text-anchor=\"middle\" y=\"5\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:12.5px; font-weight:600; fill:#2B2330;\">記述ア ×：賄賂＝非財産罪<\u002Ftext><\u002Fg>\n          <g transform=\"translate(820, 540)\"><rect x=\"-110\" y=\"-22\" width=\"220\" height=\"44\" rx=\"8\" style=\"fill:#fff; stroke:#D6C9DC; stroke-width:1;\"><\u002Frect><text text-anchor=\"middle\" y=\"5\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:12.5px; font-weight:600; fill:#2B2330;\">記述イ ×：民193で盗品性存続<\u002Ftext><\u002Fg>\n          <g transform=\"translate(1040, 540)\"><rect x=\"-104\" y=\"-22\" width=\"208\" height=\"44\" rx=\"8\" style=\"fill:#fff; stroke:#D6C9DC; stroke-width:1;\"><\u002Frect><text text-anchor=\"middle\" y=\"5\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:12.5px; font-weight:600; fill:#2B2330;\">記述エ ×：本犯違法で足る<\u002Ftext><\u002Fg>\n\n          <g transform=\"translate(750, 710)\"><rect x=\"-300\" y=\"-52\" width=\"600\" height=\"104\" rx=\"12\" style=\"fill:#6E5C7E;\"><\u002Frect><text text-anchor=\"middle\" y=\"-18\" style=\"font-family:'Shippori Mincho B1',serif; font-size:16px; font-weight:700; fill:#fff; letter-spacing:.03em;\">▼ 本問の論点<\u002Ftext><text text-anchor=\"middle\" y=\"10\" style=\"font-family:'Zen Kaku Gothic Antique',sans-serif; font-size:12.5px; fill:#EDE2EF;\">256条1項の客体「財産罪に当たる行為によって領得された物」の外延<\u002Ftext><text text-anchor=\"middle\" y=\"34\" style=\"font-family:'Source Code Pro',monospace; font-size:13px; fill:#fff; letter-spacing:.06em;\">○×評価 ＝ ア× ／ イ× ／ ウ○ ／ エ×<\u002Ftext><\u002Fg>\n          <line x1=\"560\" y1=\"688\" x2=\"400\" y2=\"568\" style=\"stroke:#8E6E9A; stroke-width:2.4; stroke-dasharray:7 4; fill:none;\" marker-end=\"url(#treeArr)\"><\u002Fline>\n        <\u002Fsvg>\n      <\u002Fdiv>\n      <p style=\"margin:14px 0 0; font-family:var(--sans); font-size:13px; color:var(--ink-soft); letter-spacing:.03em;\">図：盗品等関与罪（256条1項）の客体論の体系的位置づけと本問4記述の○×評価（4階層 + 本問論点）<\u002Fp>\n    <\u002Fsection>\n\n    <!-- ============ 論点マインドマップ ============ -->\n    <div style=\"display:flex; align-items:center; gap:18px; margin:48px 0 24px;\">\n      <span style=\"font-family:var(--mono); font-size:12px; letter-spacing:.28em; color:var(--violet); font-weight:600;\">MAP 02<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:var(--line-2);\"><\u002Fspan>\n      <span style=\"font-family:var(--serif); font-size:14px; letter-spacing:.1em; color:var(--ink-soft);\">論点マインドマップ<\u002Fspan>\n    <\u002Fdiv>\n\n    <section id=\"mindmap-radial\" style=\"background:var(--card); border:1px solid var(--line); border-radius:6px; padding:28px 30px; margin-bottom:24px;\">\n      <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:8px; padding:14px;\">\n        <svg viewBox=\"0 0 1500 1300\" xmlns=\"http://www.w3.org/2000/svg\" role=\"img\" aria-label=\"盗品等関与罪（256条1項）の客体性をめぐる本問4記述の○×評価の放射図\" style=\"display:block; max-width:100%; height:auto;\">\n          <defs>\n            <marker id=\"radArr\" viewBox=\"0 0 10 10\" refX=\"9\" refY=\"5\" markerWidth=\"7\" markerHeight=\"7\" orient=\"auto\"><path d=\"M2 1L8 5L2 9\" style=\"fill:none; stroke:#8E6E9A; stroke-width:1.6; stroke-linecap:round;\"><\u002Fpath><\u002Fmarker>\n          <\u002Fdefs>\n          <g transform=\"translate(28, 30)\"><text style=\"font-family:'Source Code Pro',monospace; font-size:13px; fill:#8A7E94;\">凡例：中心＝256条客体性の評価 → 主要枝7個（記述ア〜エ＋保護法益＋本犯の犯罪性＋即時取得）＋本問の論点（破線矢印）<\u002Ftext><\u002Fg>\n\n          <line x1=\"750\" y1=\"515\" x2=\"750\" y2=\"260\" style=\"stroke:#8E6E9A; stroke-width:2.2; fill:none;\"><\u002Fline>\n          <line x1=\"892\" y1=\"545\" x2=\"1170\" y2=\"350\" style=\"stroke:#8E6E9A; stroke-width:2.2; fill:none;\"><\u002Fline>\n          <line x1=\"925\" y1=\"590\" x2=\"1260\" y2=\"590\" style=\"stroke:#8E6E9A; stroke-width:2.2; fill:none;\"><\u002Fline>\n          <line x1=\"892\" y1=\"635\" x2=\"1170\" y2=\"830\" style=\"stroke:#8E6E9A; stroke-width:2.2; fill:none;\"><\u002Fline>\n
