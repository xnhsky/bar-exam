document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"9af61f8b-81ad-4043-874c-523cae53f913\"><\u002Fscript>\n<\u002Fhead>\n<body>\n\n<x-dc>\n<helmet>\n\n<style>\n  html{ -webkit-text-size-adjust:100%; scroll-behavior:smooth; }\n  body{ margin:0; }\n  *{ box-sizing:border-box; }\n<\u002Fstyle>\n<\u002Fhelmet>\n\n<div style=\"--ink:#2B2330; --ink-soft:#6E6478; --violet:#8E6E9A; --violet-deep:#4A3D54; --violet-darker:#6F5A7C; --teal:#5E8C8C; --cream:#F6EEDD; --page:#F1EAF1; --card:#FFFFFF; --line:#E7DEEA; --line-2:#D6C9DC; --tint:#F5EFF6; --tint-2:#EDE2EF; --ok:#4F8A5B; --ng:#A0507A; --serif:'Shippori Mincho B1','Yu Mincho',serif; --sans:'Zen Kaku Gothic Antique','Hiragino Sans','Yu Gothic',sans-serif; --quote:'Noto Serif JP','Yu Mincho',serif; --mono:'Source Code Pro',monospace; background:var(--page); color:var(--ink); font-family:var(--sans); font-weight:500; line-height:2.0; letter-spacing:.02em; font-feature-settings:'palt' 1; -webkit-font-smoothing:antialiased; min-height:100vh; padding-bottom:0;\">\n\n  <div style=\"max-width:1020px; margin:0 auto; padding:0 24px;\">\n\n    <!-- ============ HEADER ============ -->\n    <header id=\"top\" style=\"background:var(--violet-deep); color:#fff; border-radius:0 0 4px 4px; padding:44px 44px 38px; margin-bottom:40px; position:relative;\">\n      <div style=\"display:flex; justify-content:space-between; align-items:baseline; font-family:var(--mono); font-size:12px; letter-spacing:.18em; color:rgba(255,255,255,.62); margin-bottom:26px;\">\n        <span>刑TX327<\u002Fspan>\n        <span>予備 R2 ／ No.10<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"font-family:var(--mono); font-size:12.5px; letter-spacing:.26em; color:#C9A9D4; text-transform:uppercase; margin-bottom:14px;\">刑法 · 予備試験 · 財産罪<\u002Fdiv>\n      <h1 style=\"font-family:var(--serif); font-weight:700; font-size:36px; line-height:1.45; letter-spacing:.04em; margin:0 0 8px; color:#fff;\">盗品等関与罪の客体<\u002Fh1>\n      <div style=\"font-family:var(--serif); font-size:17px; letter-spacing:.06em; color:rgba(255,255,255,.78); margin-bottom:26px;\">No.327 ── 「財産に対する罪に当たる行為によって領得された物」の外延<\u002Fdiv>\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:26px;\">\n        <span style=\"font-family:var(--sans); font-size:12.5px; font-weight:500; letter-spacing:.04em; color:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.32); border-radius:3px; padding:4px 12px; white-space:nowrap;\">盗品等関与罪<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:12.5px; font-weight:500; letter-spacing:.04em; color:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.32); border-radius:3px; padding:4px 12px; white-space:nowrap;\">刑法256条1項<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:12.5px; font-weight:500; letter-spacing:.04em; color:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.32); border-radius:3px; padding:4px 12px; white-space:nowrap;\">客体（盗品性）<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:12.5px; font-weight:500; letter-spacing:.04em; color:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.32); border-radius:3px; padding:4px 12px; white-space:nowrap;\">財産罪由来性<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:12.5px; font-weight:500; letter-spacing:.04em; color:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.32); border-radius:3px; padding:4px 12px; white-space:nowrap;\">直接領得物<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:12.5px; font-weight:500; letter-spacing:.04em; color:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.32); border-radius:3px; padding:4px 12px; white-space:nowrap;\">即時取得・民193<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:12.5px; font-weight:500; letter-spacing:.04em; color:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.32); border-radius:3px; padding:4px 12px; white-space:nowrap;\">親族特例244<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:12.5px; font-weight:500; letter-spacing:.04em; color:rgba(255,255,255,.9); border:1px solid rgba(255,255,255,.32); border-radius:3px; padding:4px 12px; white-space:nowrap;\">本犯の犯罪性<\u002Fspan>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:36px; padding-top:22px; border-top:1px solid rgba(255,255,255,.18);\">\n        <div>\n          <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.18em; color:rgba(255,255,255,.55); text-transform:uppercase; margin-bottom:4px;\">正答率<\u002Fdiv>\n          <div style=\"font-family:var(--serif); font-size:26px; font-weight:700; color:#fff; line-height:1;\">37<span style=\"font-size:15px; color:rgba(255,255,255,.6);\">%<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.18em; color:rgba(255,255,255,.55); text-transform:uppercase; margin-bottom:4px;\">難度<\u002Fdiv>\n          <div style=\"font-family:var(--serif); font-size:26px; font-weight:700; color:#C9A9D4; line-height:1; letter-spacing:.08em;\">★★★<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fheader>\n\n    <!-- ============ LEGEND ============ -->\n    <div style=\"display:flex; flex-wrap:wrap; align-items:center; gap:8px 18px; padding:12px 18px; background:var(--tint); border:1px solid var(--line); border-radius:4px; font-size:12.5px; color:var(--ink-soft); margin-bottom:40px;\">\n      <span style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet-deep); text-transform:uppercase; font-weight:600;\">凡例<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:6px;\"><span style=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 58%,rgba(142,110,154,.3) 58%); padding:0 4px;\">追求権<\u002Fspan>論点・重要語<\u002Fspan>\n      <span style=\"color:var(--line-2);\">／<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:6px;\"><span style=\"background:linear-gradient(transparent 58%,rgba(142,110,154,.4) 58%); font-weight:700; padding:0 3px;\">高<\u002Fspan>頻出<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:6px;\"><span style=\"background:linear-gradient(transparent 58%,rgba(94,140,140,.32) 58%); font-weight:700; padding:0 3px;\">中<\u002Fspan>標準<\u002Fspan>\n      <span style=\"color:var(--line-2);\">／<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:6px;\"><span style=\"font-family:var(--serif); font-weight:700; color:var(--violet-deep);\">条<\u002Fspan>条文<\u002Fspan>\n      <span style=\"display:inline-flex; align-items:center; gap:6px;\"><span style=\"font-family:var(--serif); font-weight:700; font-style:italic; color:var(--teal);\">判<\u002Fspan>裁判例<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- ============ PART A ============ -->\n    <div style=\"display:flex; align-items:center; gap:18px; margin:8px 0 24px;\">\n      <span style=\"font-family:var(--mono); font-size:12px; letter-spacing:.28em; color:var(--violet); font-weight:600;\">PART A<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:var(--line-2);\"><\u002Fspan>\n      <span style=\"font-family:var(--serif); font-size:14px; letter-spacing:.1em; color:var(--ink-soft);\">問題情報<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- A-1 問題文 -->\n    <section id=\"part-a\" style=\"background:var(--card); border:1px solid var(--line); border-radius:6px; padding:34px 38px; margin-bottom:24px;\">\n      <h2 style=\"font-family:var(--serif); font-size:22px; font-weight:700; color:var(--violet-deep); letter-spacing:.05em; margin:0 0 18px; padding-bottom:12px; border-bottom:1px solid var(--line);\">A-1　問題文<\u002Fh2>\n      <p style=\"font-weight:700; margin:0 0 22px; line-height:1.95; color:var(--ink);\">盗品等に関する罪についての次のアからエまでの各記述を判例の立場に従って検討し、正しい場合には<span style=\"color:var(--ok);\">1（○）<\u002Fspan>を、誤っている場合には<span style=\"color:var(--ng);\">2（×）<\u002Fspan>を選びなさい。<span style=\"font-family:var(--mono); font-size:12px; color:var(--ink-soft); letter-spacing:.04em;\">（予備 R2-10／配点3）<\u002Fspan><\u002Fp>\n\n      <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin:0 0 14px;\">4記述・○×評価<\u002Fdiv>\n\n      <div style=\"display:flex; gap:16px; padding:16px 0; border-top:1px solid var(--line);\">\n        <span style=\"flex-shrink:0; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-weight:700; font-size:16px; color:var(--violet-deep); border:1.5px solid var(--line-2); border-radius:50%;\">ア<\u002Fspan>\n        <p style=\"margin:0; line-height:1.95; font-family:var(--quote); font-weight:400;\">賄賂として収受された現金は、「盗品その他財産に対する罪に当たる行為によって領得された物」に当たる。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:16px; padding:16px 0; border-top:1px solid var(--line);\">\n        <span style=\"flex-shrink:0; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-weight:700; font-size:16px; color:var(--violet-deep); border:1.5px solid var(--line-2); border-radius:50%;\">イ<\u002Fspan>\n        <p style=\"margin:0; line-height:1.95; font-family:var(--quote); font-weight:400;\">窃取された物品を買い受けた者が、平穏に、かつ、公然とその占有を開始し、その際、善意無過失である場合、当該物品は、「盗品その他財産に対する罪に当たる行為によって領得された物」に当たる余地はない。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:16px; padding:16px 0; border-top:1px solid var(--line);\">\n        <span style=\"flex-shrink:0; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-weight:700; font-size:16px; color:var(--violet-deep); border:1.5px solid var(--line-2); border-radius:50%;\">ウ<\u002Fspan>\n        <p style=\"margin:0; line-height:1.95; font-family:var(--quote); font-weight:400;\">会社が保管する秘密資料を窃取した者が、自宅で、そのコピーを作成した場合、当該コピーは、「盗品その他財産に対する罪に当たる行為によって領得された物」に当たらない。<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex; gap:16px; padding:16px 0; border-top:1px solid var(--line); border-bottom:1px solid var(--line);\">\n        <span style=\"flex-shrink:0; width:30px; height:30px; display:flex; align-items:center; justify-content:center; font-family:var(--serif); font-weight:700; font-size:16px; color:var(--violet-deep); border:1.5px solid var(--line-2); border-radius:50%;\">エ<\u002Fspan>\n        <p style=\"margin:0; line-height:1.95; font-family:var(--quote); font-weight:400;\">親族間の犯罪に関する特例（刑法第244条）により刑が免除される犯人が窃取した物品は、「盗品その他財産に対する罪に当たる行為によって領得された物」に当たらない。<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin:26px 0 12px;\">参照条文 · 刑法<\u002Fdiv>\n      <div style=\"background:var(--tint); border-left:3px solid var(--violet); border-radius:0 4px 4px 0; padding:18px 22px; font-family:var(--quote);\">\n        <p style=\"margin:0 0 10px; line-height:1.95;\"><strong style=\"font-family:var(--serif); color:var(--violet-deep);\">第256条1項<\u002Fstrong>　<span style=\"background:linear-gradient(transparent 58%,rgba(142,110,154,.34) 58%); font-weight:600;\">盗品その他財産に対する罪に当たる行為によって領得された物<\u002Fspan>を無償で譲り受けた者は、3年以下の拘禁刑に処する。<\u002Fp>\n        <p style=\"margin:0; line-height:1.95;\"><strong style=\"font-family:var(--serif); color:var(--violet-deep);\">第244条1項<\u002Fstrong>　配偶者、直系血族又は同居の親族との間で第235条の罪（窃盗）等を犯した者は、その刑を<span style=\"color:var(--teal); font-weight:600;\">免除<\u002Fspan>する。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- A-2 解答 -->\n    <section id=\"answer-area\" style=\"background:var(--card); border:1px solid var(--line); border-radius:6px; padding:34px 38px; margin-bottom:24px;\">\n      <h2 style=\"font-family:var(--serif); font-size:22px; font-weight:700; color:var(--violet-deep); letter-spacing:.05em; margin:0 0 18px; padding-bottom:12px; border-bottom:1px solid var(--line);\">A-2　解答<\u002Fh2>\n\n      <div style=\"display:flex; flex-wrap:wrap; gap:14px; margin-bottom:24px;\">\n        <div style=\"flex:1; min-width:120px; text-align:center; border:1px solid var(--line); border-radius:6px; padding:18px 8px;\">\n          <div style=\"font-family:var(--serif); font-weight:700; font-size:18px; color:var(--ink-soft); margin-bottom:8px;\">ア<\u002Fdiv>\n          <div style=\"font-family:var(--serif); font-weight:800; font-size:34px; line-height:1; color:var(--ng);\">×<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1; min-width:120px; text-align:center; border:1px solid var(--line); border-radius:6px; padding:18px 8px;\">\n          <div style=\"font-family:var(--serif); font-weight:700; font-size:18px; color:var(--ink-soft); margin-bottom:8px;\">イ<\u002Fdiv>\n          <div style=\"font-family:var(--serif); font-weight:800; font-size:34px; line-height:1; color:var(--ng);\">×<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1; min-width:120px; text-align:center; border:1.5px solid var(--ok); border-radius:6px; padding:18px 8px; background:rgba(79,138,91,.06);\">\n          <div style=\"font-family:var(--serif); font-weight:700; font-size:18px; color:var(--ok); margin-bottom:8px;\">ウ<\u002Fdiv>\n          <div style=\"font-family:var(--serif); font-weight:800; font-size:34px; line-height:1; color:var(--ok);\">○<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1; min-width:120px; text-align:center; border:1px solid var(--line); border-radius:6px; padding:18px 8px;\">\n          <div style=\"font-family:var(--serif); font-weight:700; font-size:18px; color:var(--ink-soft); margin-bottom:8px;\">エ<\u002Fdiv>\n          <div style=\"font-family:var(--serif); font-weight:800; font-size:34px; line-height:1; color:var(--ng);\">×<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p style=\"margin:0 0 18px; line-height:1.95; background:var(--tint-2); border-radius:6px; padding:14px 18px; font-size:14.5px;\"><strong style=\"color:var(--violet-deep);\">正解の捉え方　<\u002Fstrong>組合せ番号を覚えるのではなく、各記述に現れた<strong style=\"color:var(--violet);\">法理<\u002Fstrong>で正誤を判定する。下表「論点のコア」が学習資産。<\u002Fp>\n\n      <div style=\"overflow-x:auto; border:1px solid var(--line); border-radius:6px;\">\n        <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n          <thead>\n            <tr>\n              <th style=\"background:var(--violet-deep); color:#fff; font-family:var(--sans); font-weight:700; letter-spacing:.06em; padding:11px 12px; text-align:center; width:3.4em;\">記述<\u002Fth>\n              <th style=\"background:var(--violet-deep); color:#fff; font-family:var(--sans); font-weight:700; letter-spacing:.06em; padding:11px 12px; text-align:center; width:3.6em;\">正誤<\u002Fth>\n              <th style=\"background:var(--violet-deep); color:#fff; font-family:var(--sans); font-weight:700; letter-spacing:.06em; padding:11px 14px; text-align:left;\">登場した論点のコア（転用可能な法理）<\u002Fth>\n            <\u002Ftr>\n          <\u002Fthead>\n          <tbody>\n            <tr>\n              <td style=\"border-top:1px solid var(--line); padding:12px; text-align:center; font-family:var(--serif); font-weight:700;\">ア<\u002Ftd>\n              <td style=\"border-top:1px solid var(--line); padding:12px; text-align:center; font-family:var(--serif); font-weight:800; font-size:18px; color:var(--ng);\">×<\u002Ftd>\n              <td style=\"border-top:1px solid var(--line); padding:12px 14px; line-height:1.85;\">256条1項の客体は「財産に対する罪に当たる行為によって領得された物」＝財産罪由来に限る。収賄罪・賭博罪等の非財産罪由来物は被害者の追求権が観念できず客体外。<\u002Ftd>\n            <\u002Ftr>\n            <tr style=\"background:var(--tint);\">\n              <td style=\"border-top:1px solid var(--line); padding:12px; text-align:center; font-family:var(--serif); font-weight:700;\">イ<\u002Ftd>\n              <td style=\"border-top:1px solid var(--line); padding:12px; text-align:center; font-family:var(--serif); font-weight:800; font-size:18px; color:var(--ng);\">×<\u002Ftd>\n              <td style=\"border-top:1px solid var(--line); padding:12px 14px; line-height:1.85;\">即時取得（民192）で被害者は所有権を失うが、盗品・遺失物は民193により盗難の時から2年間回復請求でき、その間は追求権が存続し盗品性を失わない（最決昭34.2.9）。<\u002Ftd>\n            <\u002Ftr>\n            <tr>\n              <td style=\"border-top:1px solid var(--line); padding:12px; text-align:center; font-family:var(--serif); font-weight:700; color:var(--ok);\">ウ<\u002Ftd>\n              <td style=\"border-top:1px solid var(--line); padding:12px; text-align:center; font-family:var(--serif); font-weight:800; font-size:18px; color:var(--ok);\">○<\u002Ftd>\n              <td style=\"border-top:1px solid var(--line); padding:12px 14px; line-height:1.85; background:rgba(79,138,91,.05);\">客体は直接領得された物に限る。窃取資料そのものは客体だが、自宅で作成したコピーは派生物で直接領得物でなく、会社の所有・追求権も及ばないため客体外。<\u002Ftd>\n            <\u002Ftr>\n            <tr style=\"background:var(--tint);\">\n              <td style=\"border-top:1px solid var(--line); padding:12px; text-align:center; font-family:var(--serif); font-weight:700;\">エ<\u002Ftd>\n              <td style=\"border-top:1px solid var(--line); padding:12px; text-align:center; font-family:var(--serif); font-weight:800; font-size:18px; color:var(--ng);\">×<\u002Ftd>\n              <td style=\"border-top:1px solid var(--line); padding:12px 14px; line-height:1.85;\">本犯は財産罪に当たる「行為」（構成要件該当・違法）で足り犯罪の完全成立は不要（大判大5.7.13）。親族特例244は一身的処罰阻却事由にすぎず違法な窃盗の成立を妨げないため盗品性は存続。<\u002Ftd>\n            <\u002Ftr>\n          <\u002Ftbody>\n        <\u002Ftable>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART B ============ -->\n    <div style=\"display:flex; align-items:center; gap:18px; margin:48px 0 24px;\">\n      <span style=\"font-family:var(--mono); font-size:12px; letter-spacing:.28em; color:var(--violet); font-weight:600;\">PART B<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:var(--line-2);\"><\u002Fspan>\n      <span style=\"font-family:var(--serif); font-size:14px; letter-spacing:.1em; color:var(--ink-soft);\">記述別解説　ア〜エ<\u002Fspan>\n    <\u002Fdiv>\n\n    <!-- ===== 記述ア ===== -->\n    <section id=\"choice-1\" style=\"background:var(--card); border:1px solid var(--line); border-radius:6px; padding:34px 38px; margin-bottom:24px;\">\n      <div style=\"display:flex; align-items:center; gap:16px; margin-bottom:24px;\">\n        <span style=\"flex-shrink:0; width:46px; height:46px; display:flex; align-items:center; justify-content:center; background:var(--violet-deep); color:#fff; border-radius:50%; font-family:var(--serif); font-weight:700; font-size:22px;\">ア<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:14px; font-weight:700; letter-spacing:.06em; color:var(--ng); border:1px solid rgba(160,80,122,.4); background:rgba(160,80,122,.08); border-radius:4px; padding:6px 14px;\">×　誤り<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid var(--line); border-radius:6px; padding:22px 24px; margin-bottom:20px;\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin-bottom:12px;\">記述原文 · ア<\u002Fdiv>\n        <p style=\"margin:0 0 16px; font-family:var(--quote); line-height:1.95;\">賄賂として収受された現金は、「盗品その他財産に対する罪に当たる行為によって領得された物」に当たる。<\u002Fp>\n        <div style=\"border-top:1px dashed var(--line-2); padding-top:14px; display:flex; gap:12px; align-items:flex-start;\">\n          <span style=\"flex-shrink:0; font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#fff; background:var(--violet); padding:3px 9px; border-radius:3px; margin-top:3px;\">一文解説<\u002Fspan>\n          <p style=\"margin:0; line-height:1.9; font-weight:600; color:var(--ink);\">賄賂収受物は<span style=\"font-weight:700; color:var(--violet-deep);\">収賄罪（非財産罪）<\u002Fspan>由来で被害者の追求権が観念できず、客体に当たらない＝<strong style=\"color:var(--ng);\">×<\u002Fstrong>。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin:24px 0 12px;\">論点ポイント<\u002Fdiv>\n      <ol style=\"list-style:none; margin:8px 0 4px; padding:2px 22px; border:1px solid var(--line); border-radius:6px; background:var(--tint); counter-reset:pt;\">\n        <li style=\"display:flex; gap:14px; padding:10px 0; counter-increment:pt;\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">1<\u002Fspan><span style=\"line-height:1.9;\"><strong style=\"color:var(--violet-deep);\">客体の財産罪由来性<\u002Fstrong>：256条1項の客体は「財産に対する罪に当たる行為によって領得された物」＝<a href=\"#law-235\" style=\"color:var(--violet-deep); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(142,110,154,.45);\">窃盗等の財産罪<\u002Fa>由来の物に限定される。<\u002Fspan><\u002Fli>\n        <li style=\"display:flex; gap:14px; padding:14px 0; border-top:1px dashed var(--line-2); counter-increment:pt;\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">2<\u002Fspan><span style=\"line-height:1.9;\"><strong style=\"color:var(--violet-deep);\">賄賂・賭博物の除外<\u002Fstrong>：賄賂（収賄罪）・賭博（賭博罪）は<strong>非財産罪<\u002Fstrong>。被害者の追求権が観念できず客体に当たらない。<\u002Fspan><\u002Fli>\n        <li style=\"display:flex; gap:14px; padding:14px 0; border-top:1px dashed var(--line-2); counter-increment:pt;\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">3<\u002Fspan><span style=\"line-height:1.9;\"><strong style=\"color:var(--violet-deep);\">ひっかけの型<\u002Fstrong>：非財産罪（収賄・賭博）由来の物まで客体に含めてしまう誤り。出発点は「本犯が財産罪か」の確認。<\u002Fspan><\u002Fli>\n      <\u002Fol>\n\n      <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:6px; padding:24px 26px; margin-top:22px;\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin-bottom:14px;\">統合解説 · Synthesis<\u002Fdiv>\n        <p style=\"margin:0 0 18px; padding:14px 18px; background:var(--card); border-left:3px solid var(--violet); border-radius:0 4px 4px 0; line-height:1.9; font-weight:600;\"><span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#fff; background:var(--violet-deep); padding:3px 8px; border-radius:3px; margin-right:10px;\">GIST<\u002Fspan>256条1項の客体は「<span style=\"font-weight:700; color:var(--violet-deep);\">財産罪によって領得された物<\u002Fspan>」に限られる。賄賂として収受した現金は<span style=\"font-weight:700; color:var(--violet-deep);\">収賄罪（非財産罪）<\u002Fspan>由来で、被害者の<span style=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 60%,rgba(142,110,154,.28) 60%); padding:0 2px;\">追求権<\u002Fspan>が観念できない以上、客体に当たらない＝記述アは<strong style=\"color:var(--ng);\">×<\u002Fstrong>。<\u002Fp>\n        <div>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">1<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">条文・文言<\u002Fstrong><span style=\"line-height:1.9;\"><a href=\"#law-256\" style=\"color:var(--violet-deep); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(142,110,154,.45);\">256条1項<\u002Fa>の客体は「盗品その他<span style=\"font-weight:700; color:var(--violet-deep);\">財産に対する罪<\u002Fspan>に当たる行為によって領得された物」。本犯は<a href=\"#law-235\" style=\"color:var(--violet-deep); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(142,110,154,.45);\">窃盗・強盗・詐欺・恐喝・横領・背任等の財産罪<\u002Fa>に限定され、これ以外の罪で得た物は文言上含まれない。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">2<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">保護法益（なぜ限定するか）<\u002Fstrong><span style=\"line-height:1.9;\">本罪の保護法益は本犯被害者の<span style=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 60%,rgba(142,110,154,.28) 60%); padding:0 2px;\">追求権<\u002Fspan>＝盗まれた財物を取り戻す権利（追求権説・判例通説）。だから客体は、<span style=\"font-weight:700;\">被害者が追求権を及ぼし得る財物<\u002Fspan>でなければならない。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">3<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">あてはめ<\u002Fstrong><span style=\"line-height:1.9;\">賄賂として収受した現金は<span style=\"font-weight:700; color:var(--violet-deep);\">収賄罪（197条以下）<\u002Fspan>──職務の公正という国家的法益に対する罪で財産罪ではない──由来。財産罪の被害者が存在せず、追求権の対象となる財物がない。賭博（185条以下）で得た金銭も同じ理由で除外。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:16px 18px; margin-top:14px; background:rgba(79,138,91,.07); border:1px solid rgba(79,138,91,.25); border-radius:6px;\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--ok); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">4<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--ok); margin-bottom:4px; letter-spacing:.03em;\">結論<\u002Fstrong><span style=\"line-height:1.9;\">賄賂現金は客体に当たらない。「当たる」とする記述アは<span style=\"font-weight:700;\">客体の財産罪由来性を看過した誤り<\u002Fspan>＝<strong style=\"color:var(--ng);\">×<\u002Fstrong>。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:18px 0 0; padding:14px 18px; background:var(--cream); border-radius:6px; line-height:1.9;\"><span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#8A6D2F; border:1px solid rgba(138,109,47,.4); padding:3px 8px; border-radius:3px; margin-right:10px;\">直感<\u002Fspan>盗品罪が守るのは「被害者が盗まれた物を取り戻す道」。賄賂や賭博のカネは“被害者”がいないから取り戻す相手もいない＝そもそも<strong>盗品の土俵に上がらない<\u002Fstrong>。だから本犯が財産罪かどうかを最初に確認する。<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin:24px 0 12px;\">根拠条文・判例<\u002Fdiv>\n      <div style=\"border:1px solid var(--line); border-radius:6px; background:var(--tint); padding:18px 22px;\">\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;\">\n        <a href=\"#law-256\" style=\"font-family:var(--sans); font-size:13px; color:var(--violet-deep); text-decoration:none; border:1px solid var(--line-2); border-radius:4px; padding:7px 13px; background:var(--card);\">刑法256条1項（盗品等無償譲受け罪）<\u002Fa>\n        <a href=\"#law-235\" style=\"font-family:var(--sans); font-size:13px; color:var(--violet-deep); text-decoration:none; border:1px solid var(--line-2); border-radius:4px; padding:7px 13px; background:var(--card);\">刑法235条（前提たる財産犯の代表）<\u002Fa>\n      <\u002Fdiv>\n      <p style=\"margin:0; font-size:14px; line-height:1.9; color:var(--ink-soft);\">客体の核心要件＝<strong style=\"color:var(--violet-deep);\">財産罪由来性<\u002Fstrong>。256条の文言「財産に対する罪に当たる行為によって領得された物」は、本犯を財産罪に限定する趣旨であり、収賄罪・賭博罪等の<strong>非財産罪<\u002Fstrong>によって得た物は被害者の追求権が観念できず客体から除外される。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== 記述イ ===== -->\n    <section id=\"choice-2\" style=\"background:var(--card); border:1px solid var(--line); border-radius:6px; padding:34px 38px; margin-bottom:24px;\">\n      <div style=\"display:flex; align-items:center; gap:16px; margin-bottom:24px;\">\n        <span style=\"flex-shrink:0; width:46px; height:46px; display:flex; align-items:center; justify-content:center; background:var(--violet-deep); color:#fff; border-radius:50%; font-family:var(--serif); font-weight:700; font-size:22px;\">イ<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:14px; font-weight:700; letter-spacing:.06em; color:var(--ng); border:1px solid rgba(160,80,122,.4); background:rgba(160,80,122,.08); border-radius:4px; padding:6px 14px;\">×　誤り<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid var(--line); border-radius:6px; padding:22px 24px; margin-bottom:20px;\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin-bottom:12px;\">記述原文 · イ<\u002Fdiv>\n        <p style=\"margin:0 0 16px; font-family:var(--quote); line-height:1.95;\">窃取された物品を買い受けた者が、平穏に、かつ、公然とその占有を開始し、その際、善意無過失である場合、当該物品は、「盗品その他財産に対する罪に当たる行為によって領得された物」に当たる余地はない。<\u002Fp>\n        <div style=\"border-top:1px dashed var(--line-2); padding-top:14px; display:flex; gap:12px; align-items:flex-start;\">\n          <span style=\"flex-shrink:0; font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#fff; background:var(--violet); padding:3px 9px; border-radius:3px; margin-top:3px;\">一文解説<\u002Fspan>\n          <p style=\"margin:0; line-height:1.9; font-weight:600; color:var(--ink);\">即時取得後も<span style=\"font-weight:700; color:var(--violet-deep);\">民法193条の2年間<\u002Fspan>は被害者の追求権が残り盗品性は消えないから、「当たる余地はない」とは言えない＝<strong style=\"color:var(--ng);\">×<\u002Fstrong>。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin:24px 0 12px;\">論点ポイント<\u002Fdiv>\n      <ol style=\"list-style:none; margin:8px 0 4px; padding:2px 22px; border:1px solid var(--line); border-radius:6px; background:var(--tint);\">\n        <li style=\"display:flex; gap:14px; padding:10px 0;\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">1<\u002Fspan><span style=\"line-height:1.9;\"><strong style=\"color:var(--violet-deep);\">即時取得の効果<\u002Fstrong>：善意無過失・平穏公然の占有開始で買主は所有権を原始取得（<a href=\"#law-192-193\" style=\"color:var(--violet-deep); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(142,110,154,.45);\">民法192条<\u002Fa>）、被害者は所有権を失う。<\u002Fspan><\u002Fli>\n        <li style=\"display:flex; gap:14px; padding:14px 0; border-top:1px dashed var(--line-2);\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">2<\u002Fspan><span style=\"line-height:1.9;\"><strong style=\"color:var(--violet-deep);\">民法193条の例外<\u002Fstrong>：盗品・遺失物は盗難の時から<strong>2年間<\u002Fstrong>回復請求可。<a href=\"#case-s34-2-9\" style=\"color:var(--teal); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(94,140,140,.5);\">最決昭34.2.9<\u002Fa>は、この間なお盗品性は失われないとする。<\u002Fspan><\u002Fli>\n        <li style=\"display:flex; gap:14px; padding:14px 0; border-top:1px dashed var(--line-2);\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">3<\u002Fspan><span style=\"line-height:1.9;\"><strong style=\"color:var(--violet-deep);\">ひっかけの型<\u002Fstrong>：即時取得＝盗品性喪失と早合点する誤り。民193の2年間は追求権が存続し客体に当たる余地が残る（「余地はない」と一律断定できない）。<\u002Fspan><\u002Fli>\n      <\u002Fol>\n\n      <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:6px; padding:24px 26px; margin-top:22px;\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin-bottom:14px;\">統合解説 · Synthesis<\u002Fdiv>\n        <p style=\"margin:0 0 18px; padding:14px 18px; background:var(--card); border-left:3px solid var(--violet); border-radius:0 4px 4px 0; line-height:1.9; font-weight:600;\"><span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#fff; background:var(--violet-deep); padding:3px 8px; border-radius:3px; margin-right:10px;\">GIST<\u002Fspan>即時取得で所有権は買主へ移るが、<span style=\"font-weight:700; color:var(--violet-deep);\">民法193条の「2年間の回復請求権」<\u002Fspan>がある間は被害者の<span style=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 60%,rgba(142,110,154,.28) 60%); padding:0 2px;\">追求権<\u002Fspan>が残る。だから盗品性は消えない（最決昭34.2.9）。「余地はない」と言い切る点が誤り＝<strong style=\"color:var(--ng);\">×<\u002Fstrong>。<\u002Fp>\n        <div>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">1<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">原則（記述の言い分）<\u002Fstrong><span style=\"line-height:1.9;\">即時取得（<a href=\"#law-192-193\" style=\"color:var(--violet-deep); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(142,110,154,.45);\">民法192条<\u002Fa>）が成立すると、買主は<span style=\"font-weight:700; color:var(--violet-deep);\">所有権を原始取得<\u002Fspan>し、被害者は所有権を失う。<em>ここだけ見ると追求権が消え盗品性も消えそう<\u002Fem>──これが記述イの理屈。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">2<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">決め手（重要な例外）<\u002Fstrong><span style=\"line-height:1.9;\">しかし盗品・遺失物は<a href=\"#law-192-193\" style=\"color:var(--violet-deep); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(142,110,154,.45);\">民法193条<\u002Fa>が、被害者に盗難・遺失の時から<span style=\"font-weight:700;\">2年間<\u002Fspan>、回復請求権を認める。所有権が移っても、この2年間は被害者が物を取り戻せる地位＝追求権を保持している。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">3<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">あてはめ<\u002Fstrong><span style=\"line-height:1.9;\"><a href=\"#case-s34-2-9\" style=\"color:var(--teal); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(94,140,140,.5);\">最決昭34.2.9<\u002Fa>は、被害者が民法193条で回復請求し得る間は盗品性は失われないと判示。よって当該物品は盗品等関与罪（256条1項）の客体に<span style=\"font-weight:700; color:var(--violet-deep);\">当たる余地がある<\u002Fspan>。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:16px 18px; margin-top:14px; background:rgba(79,138,91,.07); border:1px solid rgba(79,138,91,.25); border-radius:6px;\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--ok); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">4<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--ok); margin-bottom:4px; letter-spacing:.03em;\">結論<\u002Fstrong><span style=\"line-height:1.9;\">態様・期間を問わず一律に「当たる余地はない」と断ずるのは最決昭34.2.9と民法193条を看過した誤り＝<strong style=\"color:var(--ng);\">×<\u002Fstrong>。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:18px 0 0; padding:14px 18px; background:var(--cream); border-radius:6px; line-height:1.9;\"><span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#8A6D2F; border:1px solid rgba(138,109,47,.4); padding:3px 8px; border-radius:3px; margin-right:10px;\">直感<\u002Fspan>即時取得は所有権の「引っ越し」。でも民法193条は被害者に2年間の<strong>“追いかけ切符”<\u002Fstrong>を残す。切符が有効なうちは盗品の札が外れない。刑法の「盗品性」が民法193条の期間に連動するのがこの肢の急所。<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin:24px 0 12px;\">根拠条文・判例<\u002Fdiv>\n      <div style=\"border:1px solid var(--line); border-radius:6px; background:var(--tint); padding:18px 22px;\">\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;\">\n        <a href=\"#case-s34-2-9\" style=\"font-family:var(--sans); font-size:13px; color:var(--violet-deep); text-decoration:none; border:1px solid var(--line-2); border-radius:4px; padding:7px 13px; background:var(--card);\">最決昭34.2.9（即時取得と盗品性）<\u002Fa>\n        <a href=\"#law-192-193\" style=\"font-family:var(--sans); font-size:13px; color:var(--violet-deep); text-decoration:none; border:1px solid var(--line-2); border-radius:4px; padding:7px 13px; background:var(--card);\">民法192条・193条（即時取得・2年回復請求）<\u002Fa>\n        <a href=\"#law-256\" style=\"font-family:var(--sans); font-size:13px; color:var(--violet-deep); text-decoration:none; border:1px solid var(--line-2); border-radius:4px; padding:7px 13px; background:var(--card);\">刑法256条1項<\u002Fa>\n      <\u002Fdiv>\n      <p style=\"margin:0; font-size:14px; line-height:1.9; color:var(--ink-soft);\">核心＝<strong style=\"color:var(--violet-deep);\">盗品性の存続期間<\u002Fstrong>。即時取得で被害者は所有権を失うが、民法193条の<strong>2年間の回復請求権<\u002Fstrong>が残る限り追求権が存続し、その間は盗品性が失われない。「当たる余地はない」と断ずるのは民法193条を看過した誤り。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== 記述ウ ===== -->\n    <section id=\"choice-3\" style=\"background:var(--card); border:1.5px solid rgba(79,138,91,.35); border-radius:6px; padding:34px 38px; margin-bottom:24px;\">\n      <div style=\"display:flex; align-items:center; gap:16px; margin-bottom:24px;\">\n        <span style=\"flex-shrink:0; width:46px; height:46px; display:flex; align-items:center; justify-content:center; background:var(--ok); color:#fff; border-radius:50%; font-family:var(--serif); font-weight:700; font-size:22px;\">ウ<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:14px; font-weight:700; letter-spacing:.06em; color:var(--ok); border:1px solid rgba(79,138,91,.45); background:rgba(79,138,91,.1); border-radius:4px; padding:6px 14px;\">○　正しい<\u002Fspan>\n        <span style=\"font-family:var(--mono); font-size:11px; letter-spacing:.14em; color:var(--ok); margin-left:auto;\">本問唯一の ○<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid var(--line); border-radius:6px; padding:22px 24px; margin-bottom:20px;\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin-bottom:12px;\">記述原文 · ウ<\u002Fdiv>\n        <p style=\"margin:0 0 16px; font-family:var(--quote); line-height:1.95;\">会社が保管する秘密資料を窃取した者が、自宅で、そのコピーを作成した場合、当該コピーは、「盗品その他財産に対する罪に当たる行為によって領得された物」に当たらない。<\u002Fp>\n        <div style=\"border-top:1px dashed var(--line-2); padding-top:14px; display:flex; gap:12px; align-items:flex-start;\">\n          <span style=\"flex-shrink:0; font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#fff; background:var(--violet); padding:3px 9px; border-radius:3px; margin-top:3px;\">一文解説<\u002Fspan>\n          <p style=\"margin:0; line-height:1.9; font-weight:600; color:var(--ink);\">窃取資料の<span style=\"font-weight:700; color:var(--violet-deep);\">コピーは派生物<\u002Fspan>で直接領得物でなく、会社の所有・追求権も及ばないから、客体に当たらない＝<strong style=\"color:var(--ok);\">○<\u002Fstrong>。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin:24px 0 12px;\">論点ポイント<\u002Fdiv>\n      <ol style=\"list-style:none; margin:8px 0 4px; padding:2px 22px; border:1px solid var(--line); border-radius:6px; background:var(--tint);\">\n        <li style=\"display:flex; gap:14px; padding:10px 0;\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">1<\u002Fspan><span style=\"line-height:1.9;\">256条1項の客体は財産罪により<strong style=\"color:var(--violet-deep);\">直接領得された物<\u002Fstrong>に限られる（直接領得性の要件）。<\u002Fspan><\u002Fli>\n        <li style=\"display:flex; gap:14px; padding:14px 0; border-top:1px dashed var(--line-2);\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">2<\u002Fspan><span style=\"line-height:1.9;\">窃取資料そのものは直接領得物（客体）だが、自宅で作成した<strong style=\"color:var(--violet-deep);\">コピーは派生物<\u002Fstrong>で直接領得物でなく、会社の所有・追求権も及ばない。<\u002Fspan><\u002Fli>\n        <li style=\"display:flex; gap:14px; padding:14px 0; border-top:1px dashed var(--line-2);\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">3<\u002Fspan><span style=\"line-height:1.9;\"><strong style=\"color:var(--violet-deep);\">判定の核<\u002Fstrong>：原本（直接領得物＝客体）と、そこから作出された分身（派生物＝客体外）を区別できるかが分かれ目。<\u002Fspan><\u002Fli>\n      <\u002Fol>\n\n      <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:6px; padding:24px 26px; margin-top:22px;\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin-bottom:14px;\">統合解説 · Synthesis<\u002Fdiv>\n        <p style=\"margin:0 0 18px; padding:14px 18px; background:var(--card); border-left:3px solid var(--violet); border-radius:0 4px 4px 0; line-height:1.9; font-weight:600;\"><span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#fff; background:var(--violet-deep); padding:3px 8px; border-radius:3px; margin-right:10px;\">GIST<\u002Fspan>256条1項の客体は財産罪により「<span style=\"font-weight:700; color:var(--violet-deep);\">直接領得された物<\u002Fspan>」に限る。窃取した秘密資料そのものは客体だが、自宅で作った<span style=\"font-weight:700; color:var(--violet-deep);\">コピー（派生物）<\u002Fspan>は直接領得物でなく会社の所有・追求権も及ばない＝客体に当たらない。記述ウは<strong style=\"color:var(--ok);\">○<\u002Fstrong>（本問唯一）。<\u002Fp>\n        <div>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">1<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">直接領得性の要件<\u002Fstrong><span style=\"line-height:1.9;\"><a href=\"#law-256\" style=\"color:var(--violet-deep); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(142,110,154,.45);\">256条1項<\u002Fa>の客体は財産罪により<span style=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 60%,rgba(142,110,154,.28) 60%); padding:0 2px;\">直接領得された物<\u002Fspan>に限る。追求権は被害者がもともと有していた財物そのものに及ぶのであって、そこから新たに作出された物には当然には及ばない。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">2<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">原本とコピーの区別<\u002Fstrong><span style=\"line-height:1.9;\">窃取した<span style=\"font-weight:700; color:var(--violet-deep);\">秘密資料そのもの<\u002Fspan>は窃盗で直接領得された物＝客体。これに対し自宅で作成した<span style=\"font-weight:700; color:var(--violet-deep);\">コピー<\u002Fspan>は、窃取後に行為者が新たに作出した別個独立の物（派生物）で直接領得物ではない。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">3<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">所有・追求権の不存在<\u002Fstrong><span style=\"line-height:1.9;\">コピーは行為者が自己の用紙等で作った物で、そもそも<span style=\"font-weight:700;\">会社の所有に属さない<\u002Fspan>。会社の追求権も及ばない。直接領得性の欠如＋追求権の不存在の双方から客体外。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:16px 18px; margin-top:14px; background:rgba(79,138,91,.07); border:1px solid rgba(79,138,91,.25); border-radius:6px;\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--ok); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">4<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--ok); margin-bottom:4px; letter-spacing:.03em;\">結論<\u002Fstrong><span style=\"line-height:1.9;\">コピーは客体に当たらない。「当たらない」とする記述ウは<strong style=\"color:var(--ok);\">正しい＝○<\u002Fstrong>。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:18px 0 0; padding:14px 18px; background:var(--cream); border-radius:6px; line-height:1.9;\"><span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#8A6D2F; border:1px solid rgba(138,109,47,.4); padding:3px 8px; border-radius:3px; margin-right:10px;\">直感<\u002Fspan>盗んだ「原本」には盗品の札が付く。でもそこからコピーした「分身」は新しく作った別の紙＝盗品の札は付かない。<strong>原本（直接領得物）と分身（派生物）を切り分ける<\u002Fstrong>のがこの肢の急所。<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin:24px 0 12px;\">根拠条文・判例<\u002Fdiv>\n      <div style=\"border:1px solid var(--line); border-radius:6px; background:var(--tint); padding:18px 22px;\">\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;\">\n        <a href=\"#law-256\" style=\"font-family:var(--sans); font-size:13px; color:var(--violet-deep); text-decoration:none; border:1px solid var(--line-2); border-radius:4px; padding:7px 13px; background:var(--card);\">刑法256条1項（客体＝直接領得された物に限定）<\u002Fa>\n        <a href=\"#law-235\" style=\"font-family:var(--sans); font-size:13px; color:var(--violet-deep); text-decoration:none; border:1px solid var(--line-2); border-radius:4px; padding:7px 13px; background:var(--card);\">刑法235条（直接領得物としての窃取資料）<\u002Fa>\n      <\u002Fdiv>\n      <p style=\"margin:0; font-size:14px; line-height:1.9; color:var(--ink-soft);\">核心＝<strong style=\"color:var(--violet-deep);\">客体の直接領得性<\u002Fstrong>。直接領得された物（窃取資料そのもの）は客体だが、そこから作出された<strong>コピー（派生物）<\u002Fstrong>は直接領得物でなく、かつ会社の所有・追求権も及ばないため客体に当たらない。記述ウは正しい。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ===== 記述エ ===== -->\n    <section id=\"choice-4\" style=\"background:var(--card); border:1px solid var(--line); border-radius:6px; padding:34px 38px; margin-bottom:24px;\">\n      <div style=\"display:flex; align-items:center; gap:16px; margin-bottom:24px;\">\n        <span style=\"flex-shrink:0; width:46px; height:46px; display:flex; align-items:center; justify-content:center; background:var(--violet-deep); color:#fff; border-radius:50%; font-family:var(--serif); font-weight:700; font-size:22px;\">エ<\u002Fspan>\n        <span style=\"font-family:var(--sans); font-size:14px; font-weight:700; letter-spacing:.06em; color:var(--ng); border:1px solid rgba(160,80,122,.4); background:rgba(160,80,122,.08); border-radius:4px; padding:6px 14px;\">×　誤り<\u002Fspan>\n      <\u002Fdiv>\n\n      <div style=\"border:1px solid var(--line); border-radius:6px; padding:22px 24px; margin-bottom:20px;\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin-bottom:12px;\">記述原文 · エ<\u002Fdiv>\n        <p style=\"margin:0 0 16px; font-family:var(--quote); line-height:1.95;\">親族間の犯罪に関する特例（刑法第244条）により刑が免除される犯人が窃取した物品は、「盗品その他財産に対する罪に当たる行為によって領得された物」に当たらない。<\u002Fp>\n        <div style=\"border-top:1px dashed var(--line-2); padding-top:14px; display:flex; gap:12px; align-items:flex-start;\">\n          <span style=\"flex-shrink:0; font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#fff; background:var(--violet); padding:3px 9px; border-radius:3px; margin-top:3px;\">一文解説<\u002Fspan>\n          <p style=\"margin:0; line-height:1.9; font-weight:600; color:var(--ink);\">本犯は<span style=\"font-weight:700; color:var(--violet-deep);\">違法な行為<\u002Fspan>で足り、親族特例の刑免除は処罰阻却にすぎず盗品性を失わせないから、客体に当たる＝<strong style=\"color:var(--ng);\">×<\u002Fstrong>。<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin:24px 0 12px;\">論点ポイント<\u002Fdiv>\n      <ol style=\"list-style:none; margin:8px 0 4px; padding:2px 22px; border:1px solid var(--line); border-radius:6px; background:var(--tint);\">\n        <li style=\"display:flex; gap:14px; padding:10px 0;\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">1<\u002Fspan><span style=\"line-height:1.9;\">本犯（前提財産犯）は犯罪として完全に成立する必要はなく、<strong style=\"color:var(--violet-deep);\">構成要件該当・違法な行為<\u002Fstrong>で足りる（<a href=\"#case-t5-7-13\" style=\"color:var(--teal); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(94,140,140,.5);\">大判大5.7.13<\u002Fa>）。<\u002Fspan><\u002Fli>\n        <li style=\"display:flex; gap:14px; padding:14px 0; border-top:1px dashed var(--line-2);\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">2<\u002Fspan><span style=\"line-height:1.9;\">親族特例（<a href=\"#law-244\" style=\"color:var(--violet-deep); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(142,110,154,.45);\">244条<\u002Fa>）は<strong style=\"color:var(--violet-deep);\">一身的処罰阻却事由<\u002Fstrong>で犯罪成立を妨げない。責任無能力者・公訴時効完成でも盗品性は肯定。<\u002Fspan><\u002Fli>\n        <li style=\"display:flex; gap:14px; padding:14px 0; border-top:1px dashed var(--line-2);\"><span style=\"flex-shrink:0; width:24px; height:24px; display:inline-flex; align-items:center; justify-content:center; background:var(--tint-2); color:var(--violet-deep); border-radius:50%; font-family:var(--mono); font-weight:600; font-size:12.5px;\">3<\u002Fspan><span style=\"line-height:1.9;\"><strong style=\"color:var(--violet-deep);\">ひっかけの型<\u002Fstrong>：「犯人が罰されない（刑の免除）」を「物が盗品でない」と取り違える誤り。免除されるのは処罰であって物の盗品性ではない。<\u002Fspan><\u002Fli>\n      <\u002Fol>\n\n      <div style=\"background:var(--tint); border:1px solid var(--line); border-radius:6px; padding:24px 26px; margin-top:22px;\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin-bottom:14px;\">統合解説 · Synthesis<\u002Fdiv>\n        <p style=\"margin:0 0 18px; padding:14px 18px; background:var(--card); border-left:3px solid var(--violet); border-radius:0 4px 4px 0; line-height:1.9; font-weight:600;\"><span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#fff; background:var(--violet-deep); padding:3px 8px; border-radius:3px; margin-right:10px;\">GIST<\u002Fspan>本犯（前提財産犯）は犯罪として完全に成立する必要はなく、<span style=\"font-weight:700; color:var(--violet-deep);\">構成要件該当・違法な行為で足りる<\u002Fspan>（大判大5.7.13）。親族特例（244条）は<span style=\"font-weight:700; color:var(--violet-deep);\">一身的処罰阻却事由<\u002Fspan>で違法な窃盗の成立を妨げないから、その窃取物も盗品＝客体に当たる。記述エは<strong style=\"color:var(--ng);\">×<\u002Fstrong>。<\u002Fp>\n        <div>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">1<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">条文＝「行為」<\u002Fstrong><span style=\"line-height:1.9;\">256条1項は「財産に対する罪に当たる<span style=\"font-weight:700; color:var(--violet-deep);\">行為<\u002Fspan>によって領得された物」。条文は「財産罪が成立すること」ではなく「財産罪に当たる<span style=\"font-weight:700; color:var(--violet-deep); background:linear-gradient(transparent 60%,rgba(142,110,154,.28) 60%); padding:0 2px;\">行為<\u002Fspan>」によることを要求し、本犯者が現実に処罰されるか（可罰性）とは切り離されている。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">2<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">本犯の犯罪性不要論<\u002Fstrong><span style=\"line-height:1.9;\"><a href=\"#case-t5-7-13\" style=\"color:var(--teal); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(94,140,140,.5);\">大判大5.7.13<\u002Fa>は、本犯は犯罪として成立する必要はなく構成要件該当・違法な行為で足りるとする。ゆえに<span style=\"font-weight:700;\">責任無能力者（14歳未満）の窃取物・公訴時効完成<\u002Fspan>の本犯の領得物も盗品性が肯定される。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:14px 0; border-top:1px solid var(--line);\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--violet); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">3<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--violet-deep); margin-bottom:4px; letter-spacing:.03em;\">親族特例の性質<\u002Fstrong><span style=\"line-height:1.9;\"><a href=\"#law-244\" style=\"color:var(--violet-deep); font-weight:700; text-decoration:none; border-bottom:1px solid rgba(142,110,154,.45);\">244条<\u002Fa>は政策的に処罰のみを阻却する<span style=\"font-weight:700; color:var(--violet-deep);\">一身的処罰阻却事由<\u002Fspan>で、犯罪の成立（違法性）を否定しない。だから免除される犯人の窃盗も違法な窃盗として成立し、その領得物は盗品。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n          <div style=\"display:flex; gap:14px; padding:16px 18px; margin-top:14px; background:rgba(79,138,91,.07); border:1px solid rgba(79,138,91,.25); border-radius:6px;\"><span style=\"flex-shrink:0; width:26px; height:26px; display:inline-flex; align-items:center; justify-content:center; background:var(--ok); color:#fff; border-radius:50%; font-family:var(--mono); font-weight:600; font-size:13px;\">4<\u002Fspan><div style=\"flex:1;\"><strong style=\"display:block; font-family:var(--serif); color:var(--ok); margin-bottom:4px; letter-spacing:.03em;\">結論<\u002Fstrong><span style=\"line-height:1.9;\">その窃取物も客体に当たる。「当たらない」とする記述エは、大判大5.7.13を踏まえれば、刑の免除（人）と物の盗品性を取り違えた誤り＝<strong style=\"color:var(--ng);\">×<\u002Fstrong>。<\u002Fspan><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:18px 0 0; padding:14px 18px; background:var(--cream); border-radius:6px; line-height:1.9;\"><span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.1em; color:#8A6D2F; border:1px solid rgba(138,109,47,.4); padding:3px 8px; border-radius:3px; margin-right:10px;\">直感<\u002Fspan>「犯人が罰されない」と「物が盗品でない」は別の話。244条が消すのは“犯人への処罰”だけで、<strong>“物に付いた盗品の札”は外さない<\u002Fstrong>。だから免除でも不処罰でも、違法な財産犯が成立していればその物は盗品。<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--violet); text-transform:uppercase; margin:24px 0 12px;\">根拠条文・判例<\u002Fdiv>\n      <div style=\"border:1px solid var(--line); border-radius:6px; background:var(--tint); padding:18px 22px;\">\n      <div style=\"display:flex; flex-wrap:wrap; gap:8px; margin-bottom:14px;\">\n        <a href=\"#case-t5-7-13\" style=\"font-family:var(--sans); font-size:13px; color:var(--violet-deep); text-decoration:none; border:1px solid var(--line-2); border-radius:4px; padding:7px 13px; background:var(--card);\">大判大5.7.13（本犯は違法な行為で足りる）<\u002Fa>\n        <a href=\"#law-244\" style=\"font-family:var(--sans); font-size:13px; color:var(--violet-deep); text-decoration:none; border:1px solid var(--line-2); border-radius:4px; padding:7px 13px; background:var(--card);\">刑法244条（親族特例＝一身的処罰阻却事由）<\u002Fa>\n        <a href=\"#law-256\" style=\"font-family:var(--sans); font-size:13px; color:var(--violet-deep); text-decoration:none; border:1px solid var(--line-2); border-radius:4px; padding:7px 13px; background:var(--card);\">刑法256条1項<\u002Fa>\n      <\u002Fdiv>\n      <p style=\"margin:0; font-size:14px; line-height:1.9; color:var(--ink-soft);\">核心＝<strong style=\"color:var(--violet-deep);\">本犯の犯罪性の要否<\u002Fstrong>。256条の客体要件は財産罪に当たる「行為」によって領得された物であり、本犯が完全な犯罪である必要はなく<strong>構成要件該当・違法<\u002Fstrong>な行為で足りる。親族特例（244条）は処罰を阻却するだけで違法な窃盗の成立は妨げず、盗品性は失われない。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ PART B+ ============ -->\n    <div style=\"display:flex; align-items:center; gap:18px; margin:48px 0 24px;\">\n      <span style=\"font-family:var(--mono); font-size:12px; letter-spacing:.28em; color:var(--violet); font-weight:600;\">PART B+<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:var(--line-2);\"><\u002Fspan>\n      <span style=\"font-family:var(--serif); font-size:14px; letter-spacing:.1em; color:var(--ink-soft);\">横断・比較・罠コラム<\u002Fspan>\n    <\u002Fdiv>\n\n    <section id=\"cross-column-sec\" style=\"background:var(--card); border:1px solid var(--line); border-radius:6px; padding:34px 38px; margin-bottom:24px;\">\n\n      <!-- 刑×民 横断 -->\n      <div style=\"margin-bottom:38px;\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--teal); text-transform:uppercase; margin-bottom:8px;\">横断 · 刑 × 民<\u002Fdiv>\n        <h3 style=\"font-family:var(--serif); font-size:18px; font-weight:700; color:var(--violet-deep); letter-spacing:.04em; margin:0 0 12px;\">即時取得と盗品回復請求（記述イの急所）<\u002Fh3>\n        <p style=\"margin:0 0 16px; line-height:1.9;\">記述イは刑法だけでは解けない。客体の「盗品性」が<strong style=\"color:var(--violet-deep);\">民法193条の回復請求期間<\u002Fstrong>に連動する、典型的な刑×民の横断論点。<\u002Fp>\n        <div style=\"overflow-x:auto; border:1px solid var(--line); border-radius:6px; margin-bottom:14px;\">\n          <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n            <thead><tr>\n              <th style=\"background:var(--violet-deep); color:#fff; font-family:var(--sans); font-weight:700; padding:10px 12px; text-align:left; width:18%;\">観点<\u002Fth>\n              <th style=\"background:var(--violet-deep); color:#fff; font-family:var(--sans); font-weight:700; padding:10px 12px; text-align:left;\">民法192条　即時取得<\u002Fth>\n              <th style=\"background:var(--violet-deep); color:#fff; font-family:var(--sans); font-weight:700; padding:10px 12px; text-align:left;\">民法193条　盗品・遺失物の特則<\u002Fth>\n            <\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr>\n                <th style=\"border-top:1px solid var(--line); background:var(--tint-2); font-weight:700; padding:11px 12px; text-align:left; white-space:nowrap;\">効果<\u002Fth>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">善意無過失・平穏公然の占有者が<strong style=\"color:var(--violet-deep);\">所有権を原始取得<\u002Fstrong><\u002Ftd>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">被害者・遺失主は盗難等の時から<strong style=\"color:var(--violet-deep);\">2年間<\u002Fstrong>、回復請求できる<\u002Ftd>\n              <\u002Ftr>\n              <tr style=\"background:var(--tint);\">\n                <th style=\"border-top:1px solid var(--line); background:var(--tint-2); font-weight:700; padding:11px 12px; text-align:left; white-space:nowrap;\">刑256への影響<\u002Fth>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">所有権喪失＝追求権が消える<em>ように見える<\u002Fem><\u002Ftd>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">2年間は追求権が存続＝<strong style=\"color:var(--violet-deep);\">盗品性が維持<\u002Fstrong><\u002Ftd>\n              <\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <p style=\"margin:0 0 12px; padding:13px 18px; background:var(--tint); border-left:3px solid var(--violet); border-radius:0 4px 4px 0; line-height:1.9;\"><strong style=\"color:var(--violet-deep);\">決め手　<\u002Fstrong>刑法の「盗品性」は被害者の<strong>追求権<\u002Fstrong>＝民法193条の2年間の回復請求権に連動する。刑法単独では解けず、<strong>民193の2年ルール<\u002Fstrong>を知っているかが分水嶺。<\u002Fp>\n        <p style=\"margin:0; font-size:13.5px; line-height:1.85; color:var(--ink-soft);\"><span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:var(--teal); font-weight:600;\">THROUGH-LINE　<\u002Fspan>刑各論（財産罪）×民物権（即時取得・回復請求）。同型に、横領罪の「他人の物」×所有権の帰属、詐欺罪の「財産上の損害」×意思表示の効力など、<strong>財産犯は民法の権利関係とセット<\u002Fstrong>で問われやすい。<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- 比較 4軸 -->\n      <div style=\"margin-bottom:38px; padding-top:30px; border-top:1px solid var(--line);\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:var(--teal); text-transform:uppercase; margin-bottom:8px;\">比較<\u002Fdiv>\n        <h3 style=\"font-family:var(--serif); font-size:18px; font-weight:700; color:var(--violet-deep); letter-spacing:.04em; margin:0 0 12px;\">本問を貫く「客体性の4つの軸」<\u002Fh3>\n        <p style=\"margin:0 0 16px; line-height:1.9;\">本問は「256条の客体（盗品）はどこまで及ぶか」を、由来・領得態様・本犯の犯罪性・存続期間の4軸で問う。バラバラに覚えず1枚で束ねる。<\u002Fp>\n        <div style=\"overflow-x:auto; border:1px solid var(--line); border-radius:6px; margin-bottom:14px;\">\n          <table style=\"width:100%; border-collapse:collapse; font-size:14px;\">\n            <thead><tr>\n              <th style=\"background:var(--violet-deep); color:#fff; font-family:var(--sans); font-weight:700; padding:10px 12px; text-align:center; width:9%;\">記述<\u002Fth>\n              <th style=\"background:var(--violet-deep); color:#fff; font-family:var(--sans); font-weight:700; padding:10px 12px; text-align:left; width:28%;\">問われた軸<\u002Fth>\n              <th style=\"background:var(--violet-deep); color:#fff; font-family:var(--sans); font-weight:700; padding:10px 12px; text-align:center; width:8%;\">結論<\u002Fth>\n              <th style=\"background:var(--violet-deep); color:#fff; font-family:var(--sans); font-weight:700; padding:10px 12px; text-align:left;\">決め手<\u002Fth>\n            <\u002Ftr><\u002Fthead>\n            <tbody>\n              <tr>\n                <th style=\"border-top:1px solid var(--line); background:var(--tint-2); font-weight:700; padding:11px 12px; text-align:center;\">ア<\u002Fth>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">本犯は<strong>財産罪<\u002Fstrong>か（由来犯罪の限定）<\u002Ftd>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; text-align:center; font-family:var(--serif); font-weight:800; color:var(--ng);\">×<\u002Ftd>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">収賄・賭博は非財産罪＝被害者の追求権なし→客体外<\u002Ftd>\n              <\u002Ftr>\n              <tr style=\"background:rgba(79,138,91,.05);\">\n                <th style=\"border-top:1px solid var(--line); background:rgba(79,138,91,.1); font-weight:700; padding:11px 12px; text-align:center; color:var(--ok);\">ウ<\u002Fth>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\"><strong>直接領得<\u002Fstrong>された物か（派生物の除外）<\u002Ftd>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; text-align:center; font-family:var(--serif); font-weight:800; color:var(--ok);\">○<\u002Ftd>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">コピーは派生物＋会社の所有外→客体外（本問唯一の○）<\u002Ftd>\n              <\u002Ftr>\n              <tr>\n                <th style=\"border-top:1px solid var(--line); background:var(--tint-2); font-weight:700; padding:11px 12px; text-align:center;\">エ<\u002Fth>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">本犯はどこまで「<strong>犯罪<\u002Fstrong>」か（行為で足りる）<\u002Ftd>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; text-align:center; font-family:var(--serif); font-weight:800; color:var(--ng);\">×<\u002Ftd>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">親族特例＝処罰阻却にすぎず違法な窃盗は成立→盗品性維持<\u002Ftd>\n              <\u002Ftr>\n              <tr style=\"background:var(--tint);\">\n                <th style=\"border-top:1px solid var(--line); background:var(--tint-2); font-weight:700; padding:11px 12px; text-align:center;\">イ<\u002Fth>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">盗品性は<strong>いつまで<\u002Fstrong>残るか（存続期間）<\u002Ftd>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; text-align:center; font-family:var(--serif); font-weight:800; color:var(--ng);\">×<\u002Ftd>\n                <td style=\"border-top:1px solid var(--line); padding:11px 12px; line-height:1.8;\">民193の2年間は追求権存続→客体に当たる余地あり<\u002Ftd>\n              <\u002Ftr>\n            <\u002Ftbody>\n          <\u002Ftable>\n        <\u002Fdiv>\n        <p style=\"margin:0; padding:13px 18px; background:var(--tint); border-left:3px solid var(--violet); border-radius:0 4px 4px 0; line-height:1.9;\"><strong style=\"color:var(--violet-deep);\">詰める順番　<\u002Fstrong>客体性は「①本犯は財産罪由来か → ②直接領得物か → ③違法な本犯「行為」があるか → ④追求権が存続中か」の順で確認する。<strong>4軸すべて「被害者の追求権が及ぶ財物か」に還元できる<\u002Fstrong>のが本問の背骨。<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- 罠 -->\n      <div style=\"padding-top:30px; border-top:1px solid var(--line);\">\n        <div style=\"font-family:var(--mono); font-size:11px; letter-spacing:.2em; color:#A0507A; text-transform:uppercase; margin-bottom:8px;\">誤答の型 · Traps<\u002Fdiv>\n        <h3 style=\"font-family:var(--serif); font-size:18px; font-weight:700; color:var(--violet-deep); letter-spacing:.04em; margin:0 0 16px;\">間違いやすいポイント<\u002Fh3>\n        <div style=\"display:flex; flex-direction:column; gap:12px;\">\n          <p style=\"margin:0; padding:14px 18px; background:rgba(160,80,122,.06); border-left:3px solid var(--ng); border-radius:0 4px 4px 0; line-height:1.9;\"><strong style=\"color:var(--ng);\">TRAP 1（エ）　<\u002Fstrong>「犯人が罰されない＝物は盗品でない」と取り違える。免除・不処罰・時効が消すのは<strong>“人への処罰”<\u002Fstrong>だけで、<strong>“物に付いた盗品の札”<\u002Fstrong>は外れない（違法な財産犯が成立していれば盗品）。<\u002Fp>\n          <p style=\"margin:0; padding:14px 18px; background:rgba(160,80,122,.06); border-left:3px solid var(--ng); border-radius:0 4px 4px 0; line-height:1.9;\"><strong style=\"color:var(--ng);\">TRAP 2（イ）　<\u002Fstrong>「即時取得＝盗品性が即消滅」と早合点。民193の<strong>2年間<\u002Fstrong>は追求権が存続し、「当たる余地はない」と一律に断定できない。<\u002Fp>\n          <p style=\"margin:0; padding:14px 18px; background:rgba(160,80,122,.06); border-left:3px solid var(--ng); border-radius:0 4px 4px 0; line-height:1.9;\"><strong style=\"color:var(--ng);\">TRAP 3（ウ）　<\u002Fstrong>「窃取物から作ったコピーも盗品」と客体を広げすぎる。客体は<strong>直接領得された物<\u002Fstrong>に限られ、派生物は含まない。<\u002Fp>\n        <\u002Fdiv>\n        <p style=\"margin:16px 0 0; font-size:13.5px; line-height:1.85; color:var(--ink-soft);\"><span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:var(--teal); font-weight:600;\">THROUGH-LINE　<\u002Fspan>4つの罠はいずれも「<strong>被害者の追求権が現に及ぶ財物か<\u002Fstrong>」という一本の糸に還元できる。追求権で4記述を束ねると、別事案で出題されても同じ物差しで判定できる。<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ============ A-3 共通根拠 ============ -->\n    <div style=\"display:flex; align-items:center; gap:18px; margin:48px 0 24px;\">\n      <span style=\"font-family:var(--mono); font-size:12px; letter-spacing:.28em; color:var(--violet); font-weight:600;\">A-3<\u002Fspan>\n      <span style=\"flex:1; height:1px; background:var(--line-2);\"><\u002Fspan>\n      <span style=\"font-family:var(--serif); font-size:14px; letter-spacing:.1em; color:var(--ink-soft);\">共通根拠条文・判例<\u002Fspan>\n    <\u002Fdiv>\n\n    <section id=\"basis\" style=\"margin-bottom:24px; display:flex; flex-direction:column; gap:18px;\">\n\n      <div id=\"law-256\" style=\"background:var(--card); border:1px solid var(--line); border-left:4px solid var(--violet); border-radius:6px; overflow:hidden;\">\n        <div style=\"display:flex; align-items:center; gap:12px; background:var(--tint-2); padding:13px 22px; border-bottom:1px solid var(--line);\">\n          <span style=\"font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; color:#fff; background:var(--violet); padding:3px 9px; border-radius:3px;\">条文<\u002Fspan>\n          <span style=\"font-family:var(--serif); font-weight:700; font-size:16px; color:var(--violet-deep);\">刑法256条1項　盗品等無償譲受け<\u002Fspan>\n          <span style=\"margin-left:auto; font-size:13px; letter-spacing:.1em; color:var(--violet);\">★★★<\u002Fspan>\n        <\u002Fdiv>\n        <div style=\"padding:20px 24px; font-family:var(--quote);\">\n          <p style=\"margin:0 0 14px; line-height:1.95; display:flex; gap:10px;\"><span style=\"flex-shrink:0; font-family:var(--mono); font-size:12px; font-weight:600; color:var(--violet); background:var(--tint); border:1px solid var(--line-2); border-radius:3px; padding:1px 8px; height:fit-content;\">1項<\u002Fspan><span><span st
